name: Diag CI
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Test curl from GitHub Actions IP
        env:
          TOKEN: ${{ secrets.STATUS_BYPASS_TOKEN }}
        run: |
          echo "=== Public IP ==="
          curl -s https://api.ipify.org
          echo ""
          echo "=== No headers ==="
          curl -s -o /dev/null -w "code=%{http_code} time=%{time_total}\n" https://salonnare.com
          echo "=== With UA only ==="
          curl -s -o /dev/null -w "code=%{http_code}\n" -A "upptime.js.org" https://salonnare.com
          echo "=== With X-Status-Bypass ==="
          curl -s -o /dev/null -w "code=%{http_code}\n" -H "X-Status-Bypass: $TOKEN" https://salonnare.com
          echo "=== With both ==="
          curl -s -o /dev/null -w "code=%{http_code}\n" -A "upptime.js.org" -H "X-Status-Bypass: $TOKEN" https://salonnare.com
          echo "=== Full response body (no headers) ==="
          curl -s -o /tmp/r.html -w "code=%{http_code}\n" https://salonnare.com
          head -c 1000 /tmp/r.html
