status-website:
  cname: status.vaniersel.dev
  name: VanIersel Development — Status
  theme: light
  logoUrl: https://salonnare.com/logo-light-theme.svg
  favicon: https://salonnare.com/favicon.svg
  customHeadHtml: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-surface: #faf9f7;
        --color-card: #ffffff;
        --color-border: #e7e5e0;
        --color-heading: #1c1917;
        --color-body: #44403c;
        --color-muted: #78716c;
        --color-accent: #6e56cf;
        --color-success: #16a34a;
        --color-danger: #dc2626;
        --color-warning: #d97706;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
        background: var(--color-surface) !important;
        color: var(--color-body) !important;
      }

      h1, h2, h3, h4 {
        color: var(--color-heading) !important;
        font-weight: 600 !important;
      }

      .container {
        max-width: 960px !important;
      }

      .color-dot.up, .status-up {
        background-color: var(--color-success) !important;
      }
      .color-dot.down, .status-down {
        background-color: var(--color-danger) !important;
      }
      .color-dot.degraded, .status-degraded {
        background-color: var(--color-warning) !important;
      }

      .site-card, .card, section {
        background: var(--color-card) !important;
        border: 1px solid var(--color-border) !important;
        border-radius: 0.75rem !important;
        box-shadow: 0 1px 2px rgba(28, 25, 23, 0.06) !important;
      }

      a {
        color: var(--color-accent) !important;
      }
      a:hover {
        color: #5b45b0 !important;
      }

      .text-muted, small, .description {
        color: var(--color-muted) !important;
      }

      .graph-line, .bar {
        fill: var(--color-accent) !important;
        stroke: var(--color-accent) !important;
      }

      footer {
        color: var(--color-muted) !important;
        opacity: 0.7;
      }
    </style>

assignees:
  - VanIerselDev

i18n:
  locale: en-US
workflowSchedule:
  - cron: "* * * * *"

